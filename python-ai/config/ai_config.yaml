# ============================================
# ISTA AI Configuration File
# ============================================
# Single source of truth untuk seluruh konfigurasi AI
# Ubah nilai di sini untuk pergantian operasional
# 
# Dokumentasi cara mengganti konfigurasi:
# 1. Chat models: ubah di lanes.chat.models
# 2. Embedding models: ubah di lanes.embedding.models  
# 3. Reasoning model: ubah di lanes.reasoning.model (null = disabled)
# 4. Search: ubah di retrieval.search
# 5. Rerank: ubah di retrieval.semantic_rerank
# 6. SMTP Gmail: ubah di integrations.smtp_gmail
# ============================================

# ============================================
# GLOBAL SETTINGS
# ============================================
global:
  timeout: 30
  connect_timeout: 10
  read_timeout: 120
  retry_attempts: 2
  retry_delay_ms: 400

# ============================================
# LANES (Jalur AI)
# ============================================
lanes:
  # ============================================
  # LANE: CHAT (Model utama untuk percakapan)
  # ============================================
  chat:
    models:
      - label: "GPT-4.1 (Primary)"
        provider: "litellm"
        model_name: "openai/gpt-4.1"
        api_key_env: "GITHUB_TOKEN"
        base_url: "https://models.inference.ai.azure.com"
        
      - label: "GPT-4.1 (Backup Node)"
        provider: "litellm"
        model_name: "openai/gpt-4.1"
        api_key_env: "GITHUB_TOKEN_2"
        base_url: "https://models.inference.ai.azure.com"
        
      - label: "GPT-4o (Primary)"
        provider: "litellm"
        model_name: "openai/gpt-4o"
        api_key_env: "GITHUB_TOKEN"
        base_url: "https://models.inference.ai.azure.com"
        
      - label: "GPT-4o (Backup Node)"
        provider: "litellm"
        model_name: "openai/gpt-4o"
        api_key_env: "GITHUB_TOKEN_2"
        base_url: "https://models.inference.ai.azure.com"
        
      # Fallback utama saat GPT-4.1/4o kena 413: Groq punya 128K context window,
      # production-ready, dan konsisten mengikuti instruksi RAG.
      - label: "Llama 3.3 70B (Groq)"
        provider: "litellm"
        model_name: "groq/llama-3.3-70b-versatile"
        api_key_env: "GROQ_API_KEY"

      # Last resort: Gemini Flash (1M context, tapi preview = kurang stabil)
      - label: "Gemini 3 Flash"
        provider: "gemini_native"
        model_name: "gemini-3-flash-preview"
        api_key_env: "GEMINI_API_KEY"

  # ============================================
  # LANE: REASONING (Model untuk reasoning complex)
  # ============================================
  reasoning:
    # Default null - lane tidak aktif sampai model diisi
    # Contoh aktivasi:
    # model:
    #   label: "DeepSeek R1"
    #   provider: "litellm"
    #   model_name: "deepseek/deepseek-reasoner"
    #   api_key_env: "DEEPSEEK_API_KEY"
    #   base_url: "https://api.deepseek.com"
    model: null

  # ============================================
  # LANE: EMBEDDING
  # ============================================
  embedding:
    models:
      - name: "GitHub Models (OpenAI Large) - Primary"
        provider: "github"
        model: "text-embedding-3-large"
        api_key_env: "GITHUB_TOKEN"
        tpm_limit: 500000
        dimensions: 3072
        
      - name: "GitHub Models (OpenAI Large) - Backup"
        provider: "github"
        model: "text-embedding-3-large"
        api_key_env: "GITHUB_TOKEN_2"
        tpm_limit: 500000
        dimensions: 3072
        
      - name: "GitHub Models (OpenAI Small) - Fallback 1"
        provider: "github"
        model: "text-embedding-3-small"
        api_key_env: "GITHUB_TOKEN"
        tpm_limit: 500000
        dimensions: 1536
        
      - name: "GitHub Models (OpenAI Small) - Fallback 2"
        provider: "github"
        model: "text-embedding-3-small"
        api_key_env: "GITHUB_TOKEN_2"
        tpm_limit: 500000
        dimensions: 1536

# ============================================
# RETRIEVAL
# ============================================
retrieval:
  search:
    enabled: true
    api_url: "https://api.langsearch.com/v1/web-search"
    timeout: 10
    cache_ttl: 300
    default_count: 5
    default_freshness: "oneWeek"

  semantic_rerank:
    enabled: true
    api_url: "https://api.langsearch.com/v1/rerank"
    model: "langsearch-reranker-v1"
    timeout: 8
    # ── RAG document reranking ─────────────────────────────────────────────────
    top_k: 8          # Chunk yang dikembalikan ke LLM setelah reranking
    top_n: 8          # Alias top_k untuk kompatibilitas
    # ⚠️ WAJIB: doc_candidates >= top_n (makin besar = makin akurat tapi lebih lambat)
    doc_candidates: 25
    # ── Web search result reranking ────────────────────────────────────────────
    # Skala lebih kecil dari RAG karena hasil web sudah cukup relevan dari LangSearch
    web_candidates: 10  # Max hasil web yang dikirim ke reranker
    web_top_n: 5        # Hasil web terbaik setelah reranking (dikirim ke LLM)


  # ============================================
  # HYBRID SEARCH (Vector + BM25 keyword)
  # ============================================
  # Menggabungkan dense vector search dengan sparse keyword search (BM25)
  # menggunakan Reciprocal Rank Fusion (RRF). Membantu untuk:
  # - Istilah teknis dan nama spesifik (contoh: 'Habermas', 'inokulasi')
  # - Query yang berbeda wording dengan dokumen
  hybrid_search:
    enabled: true
    # Bobot BM25 vs vector (total = 1.0).
    # 0.3 = 30% BM25 + 70% vector — cocok untuk dokumen akademik
    bm25_weight: 0.3
    # Jumlah kandidat BM25 per dokumen (harus >= doc_candidates)
    bm25_candidates: 25

  # ============================================
  # HyDE (Hypothetical Document Embeddings)
  # ============================================
  # Sebelum vector search, LLM membuat jawaban hipotetis singkat dari query.
  # Jawaban hipotetis + query asli diembed bersama untuk retrieval yang lebih kaya.
  #
  # Untuk dokumen kantor/akademik: gunakan mode 'always' karena:
  #   - Keakuratan > kecepatan untuk analisis dokumen
  #   - User punya pola query beragam, tidak bisa diprediksi dengan keyword
  #   - Timeout 3s: jika LLM lambat → fallback ke query asli (tanpa error)
  #   - Actual overhead: ~300-600ms (bukan 2 detik, karena max_tokens=100)
  #
  # mode: always → DIREKOMENDASIKAN untuk dokumen kantor (+300-600ms, lebih akurat)
  # mode: smart  → aktif hanya untuk pola konseptual tertentu (fragile)
  # mode: off    → matikan sepenuhnya (tercepat, akurasi standar)
  hyde:
    enabled: true
    mode: always     # 'always' | 'smart' | 'off'
    max_tokens: 100  # jawaban hipotetis singkat (100 token = ~2-3 kalimat)
    timeout: 3       # detik — timeout ketat: jika lambat, skip gracefully


# ============================================
# SYSTEM
# ============================================
system:
  default_prompt: "Anda adalah ISTA AI, asisten virtual istana pintar. Jawablah dengan sopan dan membantu."

# ============================================
# CHUNKING
# ============================================
# Single source of truth untuk konfigurasi chunking.
# rag_service.py membaca dari sini via config_loader.
# Override per-environment: set env variable di .env (lebih prioritas dari YAML)
#
# Konfigurasi saat ini: dioptimasi untuk 50 user/hari, dokumen besar, tidak concurrent
# Jika ingin lebih cepat (server RAM >= 8 GB): naikkan aggressive_batch_size ke 150-200
chunking:
  token_chunk_size: 1500      # Max tokens per chunk (optimal untuk text-embedding-3-large)
  token_chunk_overlap: 150    # Token overlap antar chunk (10% dari chunk_size)
  aggressive_batch_size: 120  # Max chunks per batch — naik ke 200 jika RAM server >= 8 GB
  batch_delay_seconds: 0.8    # Delay antar batch (detik) — turunkan ke 0.5 jika ingin lebih cepat
  embedding_timeout: 30       # Timeout embedding request (detik)
  # Batas token per batch (bukan per chunk). API limit = 64K, tapi tiktoken cl100k_base
  # bisa underhitung 10-20% vs tokenizer API sebenarnya. Safety margin 37.5% → 40K.
  max_tokens_per_batch: 50000

  # ============================================
  # PDR (Parent Document Retrieval)
  # ============================================
  # Teknik untuk meningkatkan akurasi RAG pada dokumen panjang & terstruktur.
  # Cara kerja:
  #   - Child chunks (kecil) di-embed ke ChromaDB → digunakan untuk similarity search
  #   - Parent chunks (besar) disimpan tanpa embed → dikirim ke LLM sebagai konteks
  #   - Hasil: presisi retrieval TINGGI (child 256 token) + konteks LLM LENGKAP (parent 1500 token)
  #
  # Trade-off: storage ~2.5x lebih banyak, upload dokumen sedikit lebih lambat
  # ⚠️  Butuh re-upload dokumen agar PDR aktif (dokumen lama tetap pakai mode lama)
  pdr:
    enabled: true
    child_chunk_size: 256     # token — unit embedding untuk retrieval presisi
    child_chunk_overlap: 32   # ~12.5% overlap antar child chunk
    parent_chunk_size: 1500   # token — konteks penuh yang dikirim ke LLM
    parent_chunk_overlap: 150 # overlap antar parent chunk


# ============================================
# INTEGRATIONS
# ============================================
integrations:
  smtp_gmail:
    host: "smtp.gmail.com"
    port: 587
    encryption: "tls"
    username_env: "MAIL_USERNAME"
    # Password tidak di-hardcode - gunakan env variable
    password_env: "MAIL_PASSWORD"

# ============================================
# PROMPTS - Single source of truth untuk semua prompt AI
# ============================================
# Ubah nilai di sini untuk mengkustomisasi behavior AI
# tanpa perlu mengubah logika kode aplikasi
#
# Template Variables yang tersedia:
# - {context_str} : Isi dokumen/isi konteks dari RAG
# - {web_section} : Bagian untuk konteks hasil pencarian web
# - {question} : Pertanyaan user
# - {current_date} : Tanggal hari ini (format: Hari, DD Bulan YYYY)
# - {current_year} : Tahun saat ini
# - {results} : Hasil pencarian web yang diformat
# - {document} : Isi dokumen untuk summarization
# - {batch} : Bagian dokumen untuk partial summarization
# - {part_number} : Nomor bagian (1, 2, 3, ...)
# - {total_parts} : Total jumlah bagian
# - {combined_summaries} : Gabungan ringkasan bagian-bagian
# ============================================
prompts:
  # ============================================
  # SYSTEM PROMPT UTAMA
  # ============================================
  system:
    default: "Anda adalah ISTA AI, asisten virtual istana pintar. Jawablah dengan sopan dan membantu."

  # ============================================
  # RAG PROMPT - Untuk chat dengan dokumen
  # ============================================
  rag:
    document: |
      Anda adalah asisten AI cerdas. Jawab pertanyaan user berdasarkan referensi berikut.

      SUMBER DOKUMEN REFERENSI:
      {context_str}
      {web_section}
      ---

      Pertanyaan: {question}

      INSTRUKSI PENTING UNTUK FORMAT JAWABAN:
      1. JANGAN PERNAH menyebut istilah internal seperti "Kutipan 1", "Kutipan Dokumen 2", dsb. Gantikan secara natural dengan menyebut nama file atau merujuk ke isi dokumen tersebut.
      2. Jika di dalam teks/isi dokumen rujukan terdapat Judul Dokumen yang spesifik, sebutkan dan cetak TEBAL (BOLD).
      3. WAJIB cetak TEBAL (BOLD) setiap kali Anda menyebutkan nama file rujukan (contoh: "Berdasarkan dokumen **nama_dokumen.pdf**, ...").
      4. Utamakan informasi dari sumber dokumen di atas. Jika konteks web tersedia, gunakan hanya sebagai tambahan pelengkap yang memperkaya jawaban.
      5. Jika jawaban tidak ditemukan sama sekali di dalam dokumen rujukan, katakan secara langsung bahwa informasi tersebut tidak tersedia pada dokumen yang Anda baca.
      6. Hindari mencantumkan daftar pustaka di bagian akhir jawaban yang berbentuk "Sumber referensi: Kutipan X". Langsung saja integrasikan penyebutan nama rujukan secara natural ke dalam teks kalimat Anda.
      

      Jawaban:

  # ============================================
  # WEB SEARCH CONTEXT - Untuk informasi real-time dari web
  # ============================================
  web_search:
    context: |
      ================================================================================
      🔴 INFORMASI TERBARU DARI WEB - PRIORITAS TERTINGGI 🔴
      ================================================================================

      📅 Tanggal Hari Ini: {current_date}

      ⚠️ PERHATIAN PENTING:
      - Pengetahuan internal Anda terakhir diperbarui tahun 2024
      - Sekarang adalah tahun {current_year}
      - Data di bawah ini adalah informasi TERBARU dari web (real-time)
      - WAJIB gunakan informasi ini untuk menjawab pertanyaan tentang:
        * Pejabat pemerintahan (presiden, menteri, gubernur, dll)
        * Berita terkini dan kejadian terbaru
        * Data yang berubah dari waktu ke waktu
        * Informasi yang bersifat real-time
      - JANGAN mengandalkan pengetahuan internal untuk fakta yang bisa outdated

      📰 HASIL PENCARIAN WEB:
      =================================================================================

      {results}

      ================================================================================
      🔴 AKHIR INFORMASI TERBARU DARI WEB 🔴
      ================================================================================

    assertive_instruction: |
      Instruksi tambahan:
      - Gunakan informasi web terbaru di atas hanya jika relevan dengan pertanyaan user.
      - Jika sumber web tersedia, utamakan data faktual dari sumber tersebut untuk bagian yang bersifat real-time.
      - Jika ada bagian 'FAKTA TERSTRUKTUR' dengan skor pengadilan, sebutkan skor tersebut secara eksplisit.
      - Jawab secara ringkas, jelas, dan hindari istilah teknis internal sistem.

  # ============================================
  # SUMMARIZATION PROMPTS - Untuk ringkasan dokumen
  # ============================================
  summarization:
    single: |
      Buatkan ringkasan yang jelas dan padat dari dokumen berikut.
      Ringkasan harus mencakup poin-poin utama dan informasi penting.

      Dokumen:
      {document}

      ---

      Buat ringkasan dalam Bahasa Indonesia (maksimal 500 kata):

    partial: |
      Buatkan ringkasan singkat dari bagian dokumen berikut.
      Ini adalah bagian {part_number} dari {total_parts} bagian dokumen.

      Dokumen:
      {batch}

      ---

      Berikan ringkasan singkat (maksimal 100 kata) dari bagian ini dalam Bahasa Indonesia:

    final: |
      Berdasarkan ringkasan bagian-bagian berikut, buat ringkasan keseluruhan yang komprehensif.

      Ringkasan Bagian:
      {combined_summaries}

      ---

      Buat ringkasan keseluruhan yang jelas dan terstruktur dalam Bahasa Indonesia (maksimal 500 kata):

# ============================================
# END OF CONFIGURATION
# ============================================
