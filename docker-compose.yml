version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ista_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-secret}'
      MYSQL_DATABASE: 'istanaai'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # Tuning MySQL agar hemat RAM (default MySQL bisa makan 500+ MB)
    command: >
      --innodb-buffer-pool-size=128M
      --max-connections=50
      --key-buffer-size=16M
      --tmp-table-size=32M
      --max-heap-table-size=32M
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis for Queue & Cache
  redis:
    image: redis:alpine
    container_name: ista_redis
    restart: always
    ports:
      - "6379:6379"
    # Batasi max memory Redis agar tidak membengkak tak terbatas
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Laravel Web App
  laravel:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    container_name: ista_laravel
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=istanaai
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://python-ai:8001}
      - AI_SERVICE_TOKEN=${AI_SERVICE_TOKEN}
    volumes:
      - ./laravel:/var/www/html
      - laravel_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  mysql_data:
  laravel_storage:
